<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ICO Export Pro</title>
    <style>
        /* Figma UI3 design tokens. --figma-color-* variables are injected by
           figma.showUI({ themeColors: true }) and follow the editor theme;
           fallbacks match Figma's light theme for standalone preview. */
        :root {
            --bg: var(--figma-color-bg, #ffffff);
            --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
            --bg-hover: var(--figma-color-bg-hover, rgba(0, 0, 0, 0.06));
            --bg-selected: var(--figma-color-bg-selected, #e5f4ff);
            --bg-brand: var(--figma-color-bg-brand, #0d99ff);
            --bg-brand-hover: var(--figma-color-bg-brand-hover, #007be5);
            --bg-brand-soft: var(--figma-color-bg-brand-tertiary, #e5f4ff);
            --bg-success-soft: var(--figma-color-bg-success-tertiary, #ebffee);
            --bg-danger-soft: var(--figma-color-bg-danger-tertiary, #ffe2e0);
            --bg-warning-soft: var(--figma-color-bg-warning-tertiary, #fff1c2);
            --bg-disabled: var(--figma-color-bg-disabled, rgba(0, 0, 0, 0.12));
            --text: var(--figma-color-text, rgba(0, 0, 0, 0.9));
            --text-secondary: var(--figma-color-text-secondary, rgba(0, 0, 0, 0.5));
            --text-onbrand: var(--figma-color-text-onbrand, #ffffff);
            --text-brand: var(--figma-color-text-brand, #007be5);
            --text-success: var(--figma-color-text-success, #009951);
            --text-danger: var(--figma-color-text-danger, #dc3412);
            --text-warning: var(--figma-color-text-warning, #a15c07);
            --text-disabled: var(--figma-color-text-disabled, rgba(0, 0, 0, 0.3));
            --border: var(--figma-color-border, #e6e6e6);
            --border-strong: var(--figma-color-border-strong, #c9c9c9);
            --border-selected: var(--figma-color-border-selected, #0d99ff);
            --icon-secondary: var(--figma-color-icon-secondary, rgba(0, 0, 0, 0.5));

            --radius-s: 4px;
            --radius-m: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11px;
            line-height: 16px;
            background: var(--bg);
            color: var(--text);
            padding: 12px;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        /* ---- Header ---- */
        .app-header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .app-logo {
            width: 20px;
            height: 20px;
            display: block;
            flex-shrink: 0;
        }

        .app-title {
            font-weight: 600;
            color: var(--text);
        }

        button {
            font: inherit;
            color: inherit;
            background: none;
            border: none;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--border-selected);
            outline-offset: 1px;
        }

        /* ---- Status bar ---- */
        .status {
            flex-shrink: 0;
            padding: 6px 10px;
            border-radius: var(--radius-m);
            font-weight: 500;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .status.success {
            background: var(--bg-success-soft);
            color: var(--text-success);
        }

        .status.error {
            background: var(--bg-danger-soft);
            color: var(--text-danger);
        }

        .status.loading {
            background: var(--bg-brand-soft);
            color: var(--text-brand);
        }

        /* ---- Panels ---- */
        .panel {
            border: 1px solid var(--border);
            border-radius: var(--radius-m);
            padding: 10px;
            background: var(--bg);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .frames-panel {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .frame-count {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 0 6px;
            border-radius: 999px;
            font-size: 9px;
            line-height: 14px;
            font-weight: 600;
        }

        .frames-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow-y: auto;
            min-height: 0;
            flex: 1;
        }

        .frame-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-height: 36px;
            padding: 4px 8px;
            border-radius: var(--radius-s);
            cursor: pointer;
            text-align: left;
        }

        .frame-item:hover {
            background: var(--bg-hover);
        }

        .frame-item:active {
            background: var(--bg-selected);
        }

        .frame-item.active {
            background: var(--bg-selected);
        }

        .frame-icon {
            flex-shrink: 0;
            color: var(--icon-secondary);
        }

        .frame-item.active .frame-icon {
            color: var(--text-brand);
        }

        .frame-meta {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;
        }

        .frame-name {
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .frame-size {
            font-size: 9px;
            line-height: 12px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .frame-status {
            flex-shrink: 0;
            font-size: 9px;
            line-height: 16px;
            font-weight: 500;
            padding: 0 6px;
            border-radius: 999px;
            font-variant-numeric: tabular-nums;
        }

        .frame-status.processing {
            background: var(--bg-brand-soft);
            color: var(--text-brand);
        }

        .frame-status.completed {
            background: var(--bg-success-soft);
            color: var(--text-success);
        }

        .frame-status.warning {
            background: var(--bg-warning-soft);
            color: var(--text-warning);
        }

        .frame-status.error {
            background: var(--bg-danger-soft);
            color: var(--text-danger);
        }

        /* ---- Preview ---- */
        .preview-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 8px;
            padding: 8px;
            min-height: 72px;
            border: 1px solid var(--border);
            border-radius: var(--radius-s);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .preview-container.show {
            display: flex;
        }

        .preview-image {
            max-width: 95%;
            max-height: 48px;
            border-radius: 2px;
        }

        .frame-info {
            font-size: 9px;
            line-height: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .frame-info .frame-info-name {
            font-weight: 600;
            color: var(--text);
        }

        .preview-loading-text {
            font-size: 9px;
            color: var(--text-secondary);
        }

        /* ---- Sizes panel ---- */
        .segmented {
            display: flex;
            gap: 2px;
            padding: 2px;
            background: var(--bg-secondary);
            border-radius: var(--radius-m);
        }

        .preset-btn {
            flex: 1;
            height: 24px;
            border-radius: var(--radius-s);
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .preset-btn:hover {
            color: var(--text);
        }

        .preset-btn.active {
            background: var(--bg);
            color: var(--text);
            box-shadow: 0 0 0 1px var(--border);
        }

        .custom-sizes {
            margin-top: 8px;
        }

        .custom-sizes label {
            display: block;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .sizes-input {
            width: 100%;
            height: 32px;
            padding: 0 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-m);
            background: var(--bg);
            color: var(--text);
            font: inherit;
            font-variant-numeric: tabular-nums;
        }

        .sizes-input:hover:not(:disabled) {
            border-color: var(--border-strong);
        }

        .sizes-input:focus {
            outline: none;
            border-color: var(--border-selected);
            box-shadow: inset 0 0 0 1px var(--border-selected);
        }

        .sizes-input:disabled {
            background: var(--bg-secondary);
            color: var(--text-disabled);
            cursor: not-allowed;
        }

        /* ---- Progress ---- */
        .progress-section {
            display: none;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            height: 100%;
            background: var(--bg-brand);
            transition: width 0.2s ease;
            width: 0%;
        }

        .progress-info {
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        .progress-details {
            font-size: 9px;
            line-height: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---- Controls ---- */
        .controls {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .button {
            flex: 1;
            height: 32px;
            border-radius: var(--radius-m);
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .button.primary {
            background: var(--bg-brand);
            color: var(--text-onbrand);
        }

        .button.primary:hover:not(:disabled) {
            background: var(--bg-brand-hover);
        }

        .button.secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border-strong);
        }

        .button.secondary:hover:not(:disabled) {
            background: var(--bg-hover);
        }

        .button.secondary.active {
            background: var(--bg-brand-soft);
            border-color: var(--border-selected);
            color: var(--text-brand);
        }

        .button:active:not(:disabled) {
            opacity: 0.85;
        }

        .button:disabled {
            background: var(--bg-disabled);
            border: none;
            color: var(--text-disabled);
            cursor: not-allowed;
        }

        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--bg-brand);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            .loading-spinner { animation-duration: 2s; }
            .progress-fill, .button { transition: none; }
        }

        .empty-state {
            padding: 12px 0;
            text-align: center;
            color: var(--text-secondary);
        }

        /* ---- Tips ---- */
        .tips {
            display: flex;
            gap: 6px;
            align-items: flex-start;
            flex-shrink: 0;
            font-size: 9px;
            line-height: 13px;
            color: var(--text-secondary);
        }

        .tips svg {
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ---- Scrollbar ---- */
        .frames-list::-webkit-scrollbar {
            width: 8px;
        }

        .frames-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .frames-list::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 4px;
            border: 2px solid var(--bg);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <svg class="app-logo" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect width="512" height="512" rx="128" fill="#D1ECFF"/>
                <path d="M89.9709 304.058C101.553 304.058 110.942 313.447 110.942 325.029C110.942 336.611 101.553 346 89.9709 346C78.389 346 69 336.611 69 325.029C69 313.447 78.389 304.058 89.9709 304.058Z" fill="#0093FF"/>
                <path d="M147.641 166C159.223 166 168.612 175.389 168.612 186.971V325.029C168.612 336.611 159.223 346 147.641 346C136.059 346 126.67 336.611 126.67 325.029V186.971C126.67 175.389 136.059 166 147.641 166Z" fill="#0093FF"/>
                <path d="M277.835 166C289.417 166 298.806 175.389 298.806 186.971C298.806 198.553 289.417 207.942 277.835 207.942H238.515C231.758 207.942 226.282 213.419 226.282 220.175V291.825C226.282 298.581 231.758 304.058 238.515 304.058H277.835C289.417 304.058 298.806 313.447 298.806 325.029C298.806 336.611 289.417 346 277.835 346H238.515C208.595 346 184.34 321.745 184.34 291.825V220.175C184.34 190.255 208.595 166 238.515 166H277.835Z" fill="#0093FF"/>
                <path fill-rule="evenodd" clip-rule="evenodd" d="M409.777 166C428.115 166 442.981 180.866 442.981 199.204V312.796C442.981 330.848 428.575 345.534 410.633 345.989L409.777 346H347.738L346.881 345.989C328.939 345.534 314.534 330.848 314.534 312.796V199.204C314.534 180.866 329.4 166 347.738 166H409.777ZM356.476 304.058H401.039V207.942H356.476V304.058Z" fill="#0093FF"/>
            </svg>
            <span class="app-title">ICO Export Pro</span>
        </header>

        <div id="status" class="status">Select frames to export</div>

        <!-- Frames + Preview -->
        <div class="panel frames-panel">
            <div class="panel-title">
                Frames
                <span class="frame-count" id="frameCount">0</span>
            </div>
            <div class="frames-list" id="framesList">
                <div class="empty-state">No frames selected</div>
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="empty-state">Click a frame to preview</div>
            </div>
        </div>

        <!-- Sizes -->
        <div class="panel">
            <div class="panel-title">Sizes</div>
            <div class="segmented">
                <button type="button" class="preset-btn" data-preset="desktop">Desktop</button>
                <button type="button" class="preset-btn" data-preset="web">Web</button>
                <button type="button" class="preset-btn active" data-preset="custom">Custom</button>
            </div>
            <div class="custom-sizes">
                <label for="customSizes">Sizes in px, comma separated (max 256)</label>
                <input
                    type="text"
                    class="sizes-input"
                    id="customSizes"
                    value="16,32,48,64,128,256"
                    placeholder="16,32,48,64,128,256"
                    autocomplete="off"
                >
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-info" id="progressInfo">Preparing...</div>
            <div class="progress-details" id="progressDetails"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button type="button" class="button secondary" id="previewBtn" aria-pressed="false" disabled>Preview</button>
            <button type="button" class="button primary" id="batchExportBtn" disabled>Export</button>
        </div>

        <div class="tips">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <circle cx="6" cy="6" r="5" stroke="currentColor"/>
                <path d="M6 5.5V8.5" stroke="currentColor" stroke-linecap="round"/>
                <circle cx="6" cy="3.75" r="0.75" fill="currentColor"/>
            </svg>
            <span>Each frame becomes one .ico file with all sizes embedded — ready to use as favicon.ico or Windows app icon.</span>
        </div>
    </div>

    <script>
        // The ICO format encodes width/height in a single byte (256 stored as 0),
        // so entries larger than 256px are not representable.
        const MAX_ICO_SIZE = 256;

        // Presets data
        const PRESETS = {
            desktop: [16, 24, 32, 48, 64, 128, 256],
            web: [16, 32, 48, 64, 256],
            custom: [16, 32, 48, 64, 128, 256]
        };

        const FRAME_ICON = `
            <svg class="frame-icon" width="10" height="10" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M3.5 1v10M8.5 1v10M1 3.5h10M1 8.5h10" stroke="currentColor"/>
            </svg>
        `;

        // Global state
        let selectedFrames = [];
        let activeFrameId = null;
        let currentPreset = 'custom';
        let isExporting = false;
        let previewEnabled = false;
        let previewUrl = null;

        // Batch tracking: each frame goes through one export step and one
        // conversion step per size, so totalSteps = frames × sizes × 2.
        let batchData = {
            totalFrames: 0,
            processedFrames: 0,
            totalSteps: 0,
            doneSteps: 0
        };

        // DOM elements
        const statusEl = document.getElementById('status');
        const frameCountEl = document.getElementById('frameCount');
        const framesListEl = document.getElementById('framesList');
        const previewContainer = document.getElementById('previewContainer');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressInfo = document.getElementById('progressInfo');
        const progressDetails = document.getElementById('progressDetails');
        const previewBtn = document.getElementById('previewBtn');
        const batchExportBtn = document.getElementById('batchExportBtn');
        const customSizesInput = document.getElementById('customSizes');

        // Utility functions
        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        function showStatus(message, type = 'info') {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function showLoading(message = 'Loading...') {
            previewContainer.innerHTML = `
                <div class="loading-spinner"></div>
                <div class="preview-loading-text">${escapeHtml(message)}</div>
            `;
        }

        function updateFramesList(frames) {
            selectedFrames = frames;
            frameCountEl.textContent = frames.length;

            if (frames.length === 0) {
                framesListEl.innerHTML = '<div class="empty-state">No frames selected</div>';
                previewContainer.classList.remove('show');
                previewContainer.innerHTML = '<div class="empty-state">Click a frame to preview</div>';
                previewBtn.disabled = true;
                batchExportBtn.disabled = true;
            } else {
                framesListEl.innerHTML = frames.map(frame => `
                    <button type="button" class="frame-item" data-frame-id="${escapeHtml(frame.id)}" id="frame-${escapeHtml(frame.id)}">
                        ${FRAME_ICON}
                        <span class="frame-meta">
                            <span class="frame-name">${escapeHtml(frame.name)}</span>
                            <span class="frame-size">${frame.width}×${frame.height}px</span>
                        </span>
                        <span class="frame-status-container"></span>
                    </button>
                `).join('');

                previewBtn.disabled = false;
                batchExportBtn.disabled = false;

                // Add click handlers
                document.querySelectorAll('.frame-item').forEach(item => {
                    item.addEventListener('click', () => {
                        if (isExporting) return; // Prevent clicks during export
                        const frameId = item.dataset.frameId;
                        selectFrame(frameId);
                    });
                });

                // Preview toggle stays on across selection changes:
                // follow the new selection (previous active frame may be gone)
                if (previewEnabled) {
                    previewContainer.classList.add('show');
                    const target = frames.find(f => f.id === activeFrameId) || frames[0];
                    selectFrame(target.id);
                }
            }
        }

        function updateFrameStatus(frameId, status, message = '') {
            const frameElement = document.getElementById(`frame-${frameId}`);
            if (!frameElement) return;

            // Update status pill
            const statusContainer = frameElement.querySelector('.frame-status-container');
            if (status === 'normal') {
                statusContainer.innerHTML = '';
            } else {
                statusContainer.innerHTML = `<span class="frame-status ${status}">${escapeHtml(message)}</span>`;
            }
        }

        function selectFrame(frameId) {
            // Update active state
            document.querySelectorAll('.frame-item').forEach(item => {
                item.classList.toggle('active', item.dataset.frameId === frameId);
            });

            activeFrameId = frameId;
            const frame = selectedFrames.find(f => f.id === frameId);
            if (frame && previewEnabled) {
                parent.postMessage({ pluginMessage: { type: 'get-preview', frameId: frameId } }, '*');
            }
        }

        function setPreviewEnabled(enabled) {
            previewEnabled = enabled;
            previewBtn.classList.toggle('active', enabled);
            previewBtn.setAttribute('aria-pressed', String(enabled));
            previewContainer.classList.toggle('show', enabled);

            if (enabled && selectedFrames.length > 0) {
                const target = selectedFrames.find(f => f.id === activeFrameId) || selectedFrames[0];
                selectFrame(target.id);
            }
        }

        function showPreview(imageBytes, frameName, frameSize) {
            if (previewUrl) URL.revokeObjectURL(previewUrl);
            const blob = new Blob([imageBytes], { type: 'image/png' });
            previewUrl = URL.createObjectURL(blob);

            previewContainer.innerHTML = `
                <img class="preview-image" src="${previewUrl}" alt="Preview of ${escapeHtml(frameName)}">
                <div class="frame-info">
                    <div class="frame-info-name">${escapeHtml(frameName)}</div>
                    <div>${frameSize.width}×${frameSize.height}px</div>
                </div>
            `;
        }

        function getCurrentSizes() {
            const raw = currentPreset === 'custom'
                ? customSizesInput.value.split(',').map(s => parseInt(s.trim(), 10))
                : PRESETS[currentPreset] || PRESETS.custom;

            const valid = raw.filter(s => Number.isInteger(s) && s > 0 && s <= MAX_ICO_SIZE);
            return [...new Set(valid)].sort((a, b) => a - b);
        }

        function updateProgress() {
            const percentage = batchData.totalSteps > 0 ?
                Math.round((batchData.doneSteps / batchData.totalSteps) * 100) : 0;

            progressFill.style.width = percentage + '%';
            progressInfo.textContent = `Frame ${batchData.processedFrames}/${batchData.totalFrames} (${percentage}%)`;
        }

        // Load PNG bytes into an <img>, releasing the object URL afterwards
        function loadImage(pngBytes) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(new Blob([pngBytes], { type: 'image/png' }));
                const img = new Image();
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to load image')); };
                img.src = url;
            });
        }

        // Build one ICO image entry from PNG bytes already rendered at the
        // target size. Non-square frames are letterboxed (centered, aspect
        // ratio preserved) on a transparent canvas.
        async function createIcoEntry(pngBytes, size) {
            const img = await loadImage(pngBytes);
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const scale = Math.min(size / img.width, size / img.height);
            const w = Math.max(1, Math.round(img.width * scale));
            const h = Math.max(1, Math.round(img.height * scale));
            ctx.drawImage(img, Math.floor((size - w) / 2), Math.floor((size - h) / 2), w, h);

            if (size >= 256) {
                // 256px entries are stored as PNG (Vista+ convention, keeps size down)
                const blob = await new Promise((resolve, reject) =>
                    canvas.toBlob(b => b ? resolve(b) : reject(new Error('Failed to encode PNG')), 'image/png')
                );
                const data = new Uint8Array(await blob.arrayBuffer());
                return { size, data };
            }

            const pixels = ctx.getImageData(0, 0, size, size).data;
            return { size, data: encodeBMPEntry(pixels, size) };
        }

        // Encode a BITMAPINFOHEADER + bottom-up BGRA pixels + AND mask
        function encodeBMPEntry(pixels, size) {
            const headerSize = 40;
            const pixelDataSize = size * size * 4;
            // AND mask rows are 1 bit per pixel, padded to a 4-byte boundary
            const maskRowBytes = ((size + 31) >> 5) * 4;
            const maskSize = maskRowBytes * size;

            const data = new Uint8Array(headerSize + pixelDataSize + maskSize);
            const view = new DataView(data.buffer);

            view.setUint32(0, 40, true);                          // biSize
            view.setInt32(4, size, true);                         // biWidth
            view.setInt32(8, size * 2, true);                     // biHeight (XOR + AND)
            view.setUint16(12, 1, true);                          // biPlanes
            view.setUint16(14, 32, true);                         // biBitCount
            view.setUint32(16, 0, true);                          // biCompression (BI_RGB)
            view.setUint32(20, pixelDataSize + maskSize, true);   // biSizeImage

            // Pixels: bottom-up rows, BGRA order
            let offset = headerSize;
            for (let y = size - 1; y >= 0; y--) {
                for (let x = 0; x < size; x++) {
                    const i = (y * size + x) * 4;
                    data[offset++] = pixels[i + 2];
                    data[offset++] = pixels[i + 1];
                    data[offset++] = pixels[i];
                    data[offset++] = pixels[i + 3];
                }
            }

            // AND mask stays zeroed (fully visible; the alpha channel handles transparency)
            return data;
        }

        // Assemble a single .ico file containing all size entries
        function buildICO(entries) {
            const sorted = [...entries].sort((a, b) => a.size - b.size);
            const directorySize = 6 + 16 * sorted.length;
            const totalSize = directorySize + sorted.reduce((n, e) => n + e.data.length, 0);

            const ico = new Uint8Array(totalSize);
            const view = new DataView(ico.buffer);

            view.setUint16(0, 0, true);              // reserved
            view.setUint16(2, 1, true);              // type: icon
            view.setUint16(4, sorted.length, true);  // image count

            let dir = 6;
            let offset = directorySize;
            for (const entry of sorted) {
                ico[dir] = entry.size >= 256 ? 0 : entry.size;      // width (0 = 256)
                ico[dir + 1] = entry.size >= 256 ? 0 : entry.size;  // height (0 = 256)
                ico[dir + 2] = 0;                                   // palette size
                ico[dir + 3] = 0;                                   // reserved
                view.setUint16(dir + 4, 1, true);                   // planes
                view.setUint16(dir + 6, 32, true);                  // bits per pixel
                view.setUint32(dir + 8, entry.data.length, true);   // data size
                view.setUint32(dir + 12, offset, true);             // data offset

                ico.set(entry.data, offset);
                offset += entry.data.length;
                dir += 16;
            }

            return ico;
        }

        function downloadFile(data, filename, mimeType = 'image/x-icon') {
            try {
                const blob = new Blob([data], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 2000);
                return true;
            } catch (error) {
                console.error('Download error:', error);
                return false;
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // CRC-32 table for ZIP files (computed once)
        const CRC32_TABLE = (() => {
            const table = new Uint32Array(256);
            for (let i = 0; i < 256; i++) {
                let c = i;
                for (let j = 0; j < 8; j++) {
                    c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
                }
                table[i] = c >>> 0;
            }
            return table;
        })();

        function crc32(data) {
            let crc = 0 ^ (-1);
            for (let i = 0; i < data.length; i++) {
                crc = (crc >>> 8) ^ CRC32_TABLE[(crc ^ data[i]) & 0xFF];
            }
            return (crc ^ (-1)) >>> 0;
        }

        // ZIP creation (stored, no compression) with proper CRC-32 and structure
        function createZipFile(files) {
            const zipData = [];
            const centralDirectory = [];
            let offset = 0;

            files.forEach(file => {
                const nameBytes = new TextEncoder().encode(file.filename);
                const fileData = file.data;
                const crc = crc32(fileData);

                // Local file header (30 bytes + filename)
                const localHeader = new Uint8Array(30 + nameBytes.length);
                const view = new DataView(localHeader.buffer);

                view.setUint32(0, 0x04034b50, true);      // Local file header signature
                view.setUint16(4, 20, true);              // Version needed to extract
                view.setUint16(6, 0, true);               // General purpose bit flag
                view.setUint16(8, 0, true);               // Compression method (stored)
                view.setUint16(10, 0, true);              // Last mod file time
                view.setUint16(12, 0, true);              // Last mod file date
                view.setUint32(14, crc, true);            // CRC-32
                view.setUint32(18, fileData.length, true); // Compressed size
                view.setUint32(22, fileData.length, true); // Uncompressed size
                view.setUint16(26, nameBytes.length, true); // File name length
                view.setUint16(28, 0, true);              // Extra field length

                localHeader.set(nameBytes, 30);

                zipData.push(localHeader);
                zipData.push(fileData);

                // Central directory entry
                centralDirectory.push({
                    filename: file.filename,
                    nameBytes: nameBytes,
                    offset: offset,
                    crc: crc,
                    compressedSize: fileData.length,
                    uncompressedSize: fileData.length
                });

                offset += localHeader.length + fileData.length;
            });

            // Create central directory
            const centralDirData = [];
            let centralDirSize = 0;

            centralDirectory.forEach(entry => {
                const centralDirEntry = new Uint8Array(46 + entry.nameBytes.length);
                const view = new DataView(centralDirEntry.buffer);

                view.setUint32(0, 0x02014b50, true);      // Central directory file header signature
                view.setUint16(4, 20, true);              // Version made by
                view.setUint16(6, 20, true);              // Version needed to extract
                view.setUint16(8, 0, true);               // General purpose bit flag
                view.setUint16(10, 0, true);              // Compression method
                view.setUint16(12, 0, true);              // Last mod file time
                view.setUint16(14, 0, true);              // Last mod file date
                view.setUint32(16, entry.crc, true);      // CRC-32
                view.setUint32(20, entry.compressedSize, true);   // Compressed size
                view.setUint32(24, entry.uncompressedSize, true); // Uncompressed size
                view.setUint16(28, entry.nameBytes.length, true); // File name length
                view.setUint16(30, 0, true);              // Extra field length
                view.setUint16(32, 0, true);              // File comment length
                view.setUint16(34, 0, true);              // Disk number start
                view.setUint16(36, 0, true);              // Internal file attributes
                view.setUint32(38, 0x81800000, true);     // External file attributes (regular file)
                view.setUint32(42, entry.offset, true);   // Relative offset of local header

                centralDirEntry.set(entry.nameBytes, 46);
                centralDirData.push(centralDirEntry);
                centralDirSize += centralDirEntry.length;
            });

            // End of central directory record
            const endOfCentralDir = new Uint8Array(22);
            const endView = new DataView(endOfCentralDir.buffer);

            endView.setUint32(0, 0x06054b50, true);       // End of central dir signature
            endView.setUint16(4, 0, true);                // Number of this disk
            endView.setUint16(6, 0, true);                // Disk where central directory starts
            endView.setUint16(8, centralDirectory.length, true);  // Number of central directory records on this disk
            endView.setUint16(10, centralDirectory.length, true); // Total number of central directory records
            endView.setUint32(12, centralDirSize, true);   // Size of central directory
            endView.setUint32(16, offset, true);           // Offset of start of central directory
            endView.setUint16(20, 0, true);                // ZIP file comment length

            // Calculate total size and assemble ZIP
            const totalSize = offset + centralDirSize + 22;
            const zipFile = new Uint8Array(totalSize);
            let zipOffset = 0;

            // Copy local file headers and data
            zipData.forEach(data => {
                zipFile.set(data, zipOffset);
                zipOffset += data.length;
            });

            // Copy central directory
            centralDirData.forEach(data => {
                zipFile.set(data, zipOffset);
                zipOffset += data.length;
            });

            // Copy end of central directory
            zipFile.set(endOfCentralDir, zipOffset);

            return zipFile;
        }

        // Convert exported PNGs into one multi-size .ico per frame,
        // then download directly (single file) or as ZIP (multiple files)
        async function processBatchResults(results, documentName) {
            try {
                showStatus('Converting frames to ICO...', 'loading');

                if (results.length === 0) {
                    throw new Error('No frames were exported');
                }

                // Export-phase steps are already counted; recompute the total so
                // the conversion phase fills the remaining half of the bar even
                // if some exports failed.
                batchData.totalSteps = batchData.doneSteps +
                    results.reduce((n, frame) => n + frame.images.length, 0);

                const icoFiles = [];
                const usedNames = new Map();

                for (let frameIndex = 0; frameIndex < results.length; frameIndex++) {
                    const frame = results[frameIndex];
                    batchData.processedFrames = frameIndex + 1;

                    updateFrameStatus(frame.frameId, 'processing', 'Converting…');
                    updateProgress();

                    const entries = [];

                    for (const image of frame.images) {
                        progressDetails.textContent = `${frame.frameName} @ ${image.size}px`;

                        try {
                            const entry = await Promise.race([
                                createIcoEntry(image.bytes, image.size),
                                new Promise((_, reject) =>
                                    setTimeout(() => reject(new Error(`Timeout creating ${image.size}px entry`)), 15000)
                                )
                            ]);
                            entries.push(entry);
                        } catch (error) {
                            console.error(`ICO entry failed for ${frame.frameName} (${image.size}px):`, error);
                        }

                        batchData.doneSteps++;
                        updateProgress();

                        // Small delay to keep UI responsive
                        await delay(10);
                    }

                    if (entries.length === 0) {
                        updateFrameStatus(frame.frameId, 'error', 'Failed');
                        continue;
                    }

                    const base = frame.frameName.replace(/[^a-zA-Z0-9_-]/g, '_') || 'icon';
                    const count = usedNames.get(base) || 0;
                    usedNames.set(base, count + 1);
                    const filename = count === 0 ? `${base}.ico` : `${base}_${count + 1}.ico`;

                    icoFiles.push({ filename, data: buildICO(entries) });

                    if (entries.length === frame.images.length) {
                        updateFrameStatus(frame.frameId, 'completed', `${entries.length} sizes`);
                    } else {
                        updateFrameStatus(frame.frameId, 'warning', `${entries.length}/${frame.images.length} sizes`);
                    }
                }

                if (icoFiles.length === 0) {
                    showStatus('No ICO files were created', 'error');
                } else if (icoFiles.length === 1) {
                    progressInfo.textContent = 'Downloading...';
                    progressFill.style.width = '100%';

                    if (!downloadFile(icoFiles[0].data, icoFiles[0].filename)) {
                        throw new Error('Failed to download ICO file');
                    }
                    showStatus(`${icoFiles[0].filename} downloaded`, 'success');
                } else {
                    showStatus('Creating ZIP archive...', 'loading');
                    progressInfo.textContent = `Packaging ${icoFiles.length} ICO files into ZIP...`;
                    progressFill.style.width = '95%';
                    await delay(50);

                    const zipData = createZipFile(icoFiles);
                    const docBase = String(documentName || '')
                        .replace(/[^\p{L}\p{N} _-]/gu, '')
                        .trim()
                        .replace(/\s+/g, '_') || 'figma';
                    const zipFilename = `${docBase}_icons.zip`;

                    progressInfo.textContent = 'Downloading ZIP file...';
                    progressFill.style.width = '100%';

                    if (!downloadFile(zipData, zipFilename, 'application/zip')) {
                        throw new Error('Failed to download ZIP file');
                    }
                    showStatus(`ZIP downloaded — ${icoFiles.length} ICO files packaged`, 'success');
                }

            } catch (error) {
                console.error('Batch processing error:', error);
                showStatus('Export error: ' + error.message, 'error');
            } finally {
                setTimeout(() => {
                    isExporting = false;
                    batchExportBtn.disabled = false;
                    progressSection.classList.remove('show');
                    progressDetails.textContent = '';
                }, 2000);
            }
        }

        // Event listeners
        previewBtn.addEventListener('click', () => {
            setPreviewEnabled(!previewEnabled);
        });

        batchExportBtn.addEventListener('click', () => {
            if (isExporting || selectedFrames.length === 0) return;

            const sizes = getCurrentSizes();
            if (sizes.length === 0) {
                showStatus(`Enter valid sizes between 1 and ${MAX_ICO_SIZE}`, 'error');
                return;
            }

            isExporting = true;
            batchExportBtn.disabled = true;
            progressSection.classList.add('show');

            // Initialize batch stats (export + conversion step per size per frame)
            batchData = {
                totalFrames: selectedFrames.length,
                processedFrames: 0,
                totalSteps: selectedFrames.length * sizes.length * 2,
                doneSteps: 0
            };

            showStatus('Starting export...', 'loading');
            updateProgress();

            // Clear frame statuses
            selectedFrames.forEach(frame => {
                updateFrameStatus(frame.id, 'normal');
            });

            // Start batch export
            parent.postMessage({
                pluginMessage: {
                    type: 'batch-export',
                    sizes: sizes
                }
            }, '*');
        });

        // Preset segmented control
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentPreset = btn.dataset.preset;
                if (currentPreset !== 'custom') {
                    customSizesInput.value = PRESETS[currentPreset].join(',');
                }
                customSizesInput.disabled = currentPreset !== 'custom';
            });
        });

        // Message handler
        window.addEventListener('message', (event) => {
            const msg = event.data.pluginMessage;
            if (!msg) return;

            switch (msg.type) {
                case 'selection-changed':
                    showStatus(msg.message, msg.hasSelection ? 'success' : 'info');
                    updateFramesList(msg.frames || []);
                    break;

                case 'preview-ready':
                    // Ignore stale responses if the toggle was switched off meanwhile
                    if (!previewEnabled) break;
                    showStatus('Preview ready', 'success');
                    showPreview(msg.imageBytes, msg.frameName, msg.frameSize);
                    break;

                case 'batch-started':
                    showStatus('Rendering PNGs from Figma...', 'loading');
                    break;

                case 'batch-progress':
                    updateFrameStatus(msg.frameId, 'processing', 'Exporting…');
                    batchData.processedFrames = msg.currentFrame;
                    batchData.doneSteps++;
                    progressDetails.textContent = `${msg.frameName} @ ${msg.size}px`;
                    updateProgress();
                    break;

                case 'frame-export-error':
                    updateFrameStatus(msg.frameId, 'error', 'Failed');
                    break;

                case 'batch-complete':
                    // All PNGs exported, now convert to ICO
                    processBatchResults(msg.results, msg.fileName);
                    break;

                case 'loading':
                    showStatus(msg.message, 'loading');
                    if (msg.message.includes('preview')) {
                        showLoading(msg.message);
                    }
                    break;

                case 'error':
                    showStatus(msg.message, 'error');
                    if (previewContainer.classList.contains('show')) {
                        previewContainer.innerHTML = `<div class="empty-state">Error: ${escapeHtml(msg.message)}</div>`;
                    }
                    isExporting = false;
                    batchExportBtn.disabled = false;
                    progressSection.classList.remove('show');
                    break;
            }
        });

        // Initialize
        showStatus('Select frames to export', 'info');
    </script>
</body>
</html>
